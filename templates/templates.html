<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #e0eafc, #cfdef3);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container-box {
            width: 800px;
            height: 450px;
            display: flex;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            background: white;
        }

        .left {
            width: 40%;
            background: linear-gradient(to bottom right, #5f2c82, #49a09d);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .right {
            width: 60%;
            padding: 40px;
        }

        input {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container-box">

    <!-- LEFT SIDE -->
    <div class="left">
        <h2>Welcome Back!</h2>
        <p>Login to continue</p>
        <a href="/login"><button class="btn btn-light">SIGN IN</button></a>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <h3>Create Account</h3>

        {% if error %}
        <p style="color:red;">{{error}}</p>
        {% endif %}

        <!-- SIGNUP -->
        <form method="post" action="/signup">
            <input type="text" name="username" placeholder="Username" class="form-control" required>
            <input type="password" name="password" placeholder="Password" class="form-control" required>
            <button class="btn btn-primary w-100 mt-2">SIGN UP</button>
        </form>

        <hr>

        <!-- LOGIN -->
        <form method="post" action="/login">
            <input type="text" name="username" placeholder="Username" class="form-control" required>
            <input type="password" name="password" placeholder="Password" class="form-control" required>
            <button class="btn btn-success w-100 mt-2">LOGIN</button>
        </form>

    </div>
</div>

</body>
</html>
