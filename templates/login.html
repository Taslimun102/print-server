<!DOCTYPE html>
<html>
<head>
<title>User Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #e0eafc, #cfdef3);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container-box {
    width: 1000px;
    height: 500px;
    background: white;
    border-radius: 20px;
    display: flex;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* LEFT PANEL */
.left-panel {
    width: 40%;
    background: linear-gradient(to right, #5f2c82, #49a09d);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 2;
}

.left-panel button {
    margin: 5px;
}

/* RIGHT PANEL */
.right-panel {
    width: 60%;
    padding: 40px;
    position: relative;
}

/* FORMS */
.form-box {
    position: absolute;
    width: 70%;
    transition: opacity 0.4s ease;
}

/* Default */
#loginForm {
    opacity: 1;
    z-index: 1;
}

#signupForm {
    opacity: 0;
    z-index: 0;
}

/* Toggle */
.container-box.signup-mode #loginForm {
    opacity: 0;
    z-index: 0;
}

.container-box.signup-mode #signupForm {
    opacity: 1;
    z-index: 1;
}
</style>

</head>

<body>

<div class="container-box" id="container">

    <!-- LEFT PANEL -->
    <div class="left-panel">
        <h2 id="title">Welcome Back!</h2>
        <p id="text">Already have an account?</p>

        <button class="btn btn-light" onclick="showLogin()">Login</button>
        <button class="btn btn-outline-light" onclick="showSignup()">Signup</button>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

        <!-- LOGIN -->
        <div class="form-box" id="loginForm">
            <h3>Login</h3>

            {% if error %}
            <p style="color:red;">{{error}}</p>
            {% endif %}

            <form method="post" action="/login">
                <input name="username" class="form-control mb-2" placeholder="Username" required>
                <input name="password" type="password" class="form-control mb-2" placeholder="Password" required>
                <button class="btn btn-success w-100">Login</button>
            </form>
        </div>

        <!-- SIGNUP -->
        <div class="form-box" id="signupForm">
            <h3>Create Account</h3>

            <form method="post" action="/signup">
                <input name="username" class="form-control mb-2" placeholder="Username" required>
                <input name="password" type="password" class="form-control mb-2" placeholder="Password" required>
                <button class="btn btn-primary w-100">Signup</button>
            </form>
        </div>

    </div>

</div>

<script>
function showSignup() {
    document.getElementById("container").classList.add("signup-mode");

    document.getElementById("title").innerText = "Assalamoalikom";
    document.getElementById("text").innerText = "Create your account!";
}

function showLogin() {
    document.getElementById("container").classList.remove("signup-mode");

    document.getElementById("title").innerText = "Assalamualaikum";
    document.getElementById("text").innerText = "Already have an account?";
}
</script>

</body>
</html>
