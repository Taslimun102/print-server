<!DOCTYPE html>
<html>
<head>
    <title>DB Manager</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fb;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .btn {
            border-radius: 10px;
        }

        input, select {
            border-radius: 10px !important;
        }

        th {
            background-color: #0d6efd;
            color: white;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Password long text fix */
        .truncate {
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>

<body class="container py-4">

<!-- Header -->
<div class="header mb-4">
    <h2>🛠 Database Manager</h2>
    <a href="/admin" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Back
    </a>
</div>

<!-- Controls -->
<div class="card p-4 mb-4">

    <!-- Table Selector -->
    <form method="get" class="mb-3">
        <select name="table" onchange="this.form.submit()" class="form-select">
            {% for t in tables %}
            <option value="{{t}}" {% if t == current_table %}selected{% endif %}>
                {{t}}
            </option>
            {% endfor %}
        </select>
    </form>

    <!-- Search -->
    <form method="get" class="d-flex">
        <input type="hidden" name="table" value="{{current_table}}">
        <input name="search" value="{{search}}" class="form-control me-2" placeholder="🔍 Search...">
        <button class="btn btn-primary">
            <i class="bi bi-search"></i>
        </button>
    </form>

</div>

<!-- Add Row -->
<div class="card p-4 mb-4">
    <h5 class="mb-3"><i class="bi bi-plus-circle"></i> Add New Row</h5>

    <form method="post" action="/admin/add_row/{{current_table}}" class="row g-2">
        {% for col in col_names %}
        <div class="col-md-3">
            <input name="{{col}}" placeholder="{{col}}" class="form-control">
        </div>
        {% endfor %}

        <div class="col-12">
            <button class="btn btn-success w-100">
                <i class="bi bi-plus-lg"></i> Add Row
            </button>
        </div>
    </form>
</div>

<!-- Table -->
<div class="card p-4">
    <div class="table-responsive">

        <table class="table table-hover align-middle">

            <thead>
                <tr>
                    {% for col in col_names %}
                    <th>{{col}}</th>
                    {% endfor %}
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% if rows|length == 0 %}
                <tr>
                    <td colspan="100%" class="text-center text-muted">
                        No data found 😢
                    </td>
                </tr>
                {% endif %}

                {% for row in rows %}
                <tr>
                    {% for item in row %}
                    <td class="truncate" title="{{item}}">
                        {{item}}
                    </td>
                    {% endfor %}

                    <td>
                        <a href="/admin/delete_row/{{current_table}}/{{row[0]}}"
                           onclick="return confirm('Are you sure you want to delete this row?')"
                           class="btn btn-danger btn-sm">
                           <i class="bi bi-trash"></i>
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>

    </div>
</div>

</body>
</html>
